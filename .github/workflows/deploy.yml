name: Deploy

# Deploy to Cloudflare Pages when a GitHub Release is published.
#
# Why release-triggered (not push-to-main):
#   - Site + app are versioned together — every release includes the site
#     build matching the app build, plus the signed app binaries in the
#     release's assets.
#   - Pushing to main doesn't immediately change production; only a
#     published release does. This forces a deliberate "this is shipping"
#     decision per version bump.
#   - Release tags give us a clean audit trail: "what was live at v1.4.2?"
#     is answerable by checking out the v1.4.2 tag and running build.
#
# Branch protection: `main` is the only release source. Direct pushes are
# disabled via GitHub branch rules — PRs only (see README → "Branching").
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Cloudflare Pages environment to deploy to'
        required: true
        default: production
        type: choice
        options:
          - production
          - preview
      ref:
        description: 'Git ref (branch/tag/SHA) to deploy from. Defaults to the release tag when triggered by release:published.'
        required: false
        default: ''

# One in-flight run per release at a time. `cancel-in-progress: false` (the
# default) so we never abort a half-deployed release.
concurrency:
  group: deploy-${{ github.event.release.tag_name || github.ref }}

permissions:
  contents: read
  # cloudflare/pages-action writes a GitHub Deployment + sets commit status
  # on success/failure. Both need explicit write permissions on top of
  # the default `contents: read` token the runner ships with.
  deployments: write
  statuses: write
  checks: write

jobs:
  # Single combined job: build + ensure project exists + deploy. Splitting
  # into separate jobs would require passing `dist/client` via artifacts,
  # which complicates the project-create step (cloudflare/wrangler-action
  # requires workingDirectory validation that fails when dist/client doesn't
  # yet exist on a fresh checkout).
  build-and-deploy:
    name: Build, ensure project, deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    environment:
      name: ${{ inputs.environment || 'production' }}
      url: ${{ steps.deploy.outputs.deployment-url }}

    steps:
      - uses: actions/checkout@v4
        with:
          # For release:published, github.event.release.tag_name holds the
          # version (e.g. v1.4.2). For manual runs, fall back to `inputs.ref`
          # or the branch that triggered.
          ref: ${{ github.event.release.tag_name || inputs.ref || github.ref }}

      # pnpm version comes from package.json `packageManager` field — don't
      # also pass `version:` here or the action errors with "Multiple versions
      # of pnpm specified".
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # prerender.mjs drives a headless Chromium via Playwright. The package
      # itself is already installed by pnpm above, but the browser binary
      # isn't.
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build (vite + prerender)
        env:
          PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
        run: pnpm build

      - name: Verify build output
        run: |
          set -euo pipefail
          test -f dist/client/index.html
          for r in zh zh/privacy en en/privacy; do
            test -f "dist/client/$r/index.html" || { echo "MISSING: dist/client/$r/index.html"; exit 1; }
          done
          test -f dist/client/favicon.png
          test -f dist/client/sitemap.xml
          echo "✓ build output structure OK"

      # Ensure the Pages project exists before deploying. cloudflare/pages-action
      # errors with `Project not found` if the project has never been created
      # in the Cloudflare dashboard. `wrangler pages project create` is
      # idempotent — re-running on an existing project returns 409, which we
      # deliberately ignore.
      - name: Ensure Pages project exists
        id: ensure-project
        run: |
          if npx --yes wrangler pages project create novaview-com \
              --production-branch=main \
              --compatibility-date=2026-06-12 2>&1 | tee /tmp/project-create.log; then
            echo "::notice::Created novaview-com Pages project"
          elif grep -q "already exists" /tmp/project-create.log; then
            echo "::notice::Project novaview-com already exists, continuing"
          else
            echo "::error::Failed to create project:"
            cat /tmp/project-create.log
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: novaview-com
          directory: dist/client
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: '3'

      - name: Deployment URL
        if: steps.deploy.outputs.deployment-url != ''
        run: |
          {
            echo "## Deployment successful"
            echo ""
            echo "🌐 **${{ steps.deploy.outputs.deployment-url }}**"
            echo ""
            echo "Released from \`${{ github.event.release.tag_name || github.ref }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  lighthouse:
    name: Lighthouse mobile audit
    needs: build-and-deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Lighthouse failures (browser quirks, CI flake) must NOT fail the
    # deploy — the deployment itself already succeeded upstream. Audit
    # results still surface in the workflow run + GitHub commit status.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.ref || github.ref }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Serve prerendered HTML
        run: |
          pnpm exec vite preview --port 4173 &
          for i in $(seq 1 30); do
            curl -fs http://127.0.0.1:4173/zh/ > /dev/null && break
            sleep 1
          done
      - name: Lighthouse mobile (a11y + SEO + perf budget)
        uses: treosh/lighthouse-ci-action@v11
        with:
          configPath: .lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
