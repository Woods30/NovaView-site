<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" href="/favicon.png" />
    <title>NovaView</title>
    <meta name="description" content="Local-first, lightweight, opens in under a second. Markdown, HTML, JSON, YAML, TXT, CSV — files never leave your device." />
    <script>
      // hydration 前决定主题，防止闪烁
      (function () {
        try {
          var t = localStorage.getItem('novaview-theme');
          var dark = t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
